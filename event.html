<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Club — Event RSVP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --ink: #1a1a1a; --muted: #6b6b6b; --pale: #f5f2ee; --cream: #faf8f5;
    --border: #ddd8d0; --accent: #c0392b; --accent-soft: #f9edec;
    --success: #1a6640; --success-soft: #eaf4ee; --card: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--pale); color: var(--ink); min-height: 100vh; padding: 2rem 1rem 4rem; }
  .page { max-width: 560px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2.5rem; }
  .club-label { font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
  .movie-title { font-family: 'Playfair Display', serif; font-size: clamp(28px, 6vw, 42px); line-height: 1.15; color: var(--ink); margin-bottom: 1rem; }
  .meta-grid { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; margin-top: 1rem; }
  .meta-item { display: flex; align-items: center; gap: 6px; font-size: 13.5px; color: var(--muted); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.8rem 0; }
  .section-title { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group:last-child { margin-bottom: 0; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  input[type="text"], input[type="number"] { width: 100%; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--ink); background: var(--cream); border: 1px solid var(--border); border-radius: 8px; outline: none; transition: border-color 0.15s; }
  input:focus { border-color: var(--accent); background: #fff; }
  .btn-submit { width: 100%; padding: 13px; background: var(--accent); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; border: none; border-radius: 8px; cursor: pointer; transition: background 0.15s; margin-top: 0.25rem; }
  .btn-submit:hover { background: #a93226; }
  .btn-submit:disabled { background: var(--muted); cursor: not-allowed; }
  .msg { display: none; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-top: 0.75rem; }
  .msg.success { display: block; background: var(--success-soft); color: var(--success); border: 1px solid #b2d8c0; }
  .msg.error { display: block; background: var(--accent-soft); color: var(--accent); border: 1px solid #e8b4b0; }
  .attendance-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .attendance-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .attendance-header h3 { font-size: 14px; font-weight: 500; color: var(--ink); }
  .count-badge { background: var(--accent-soft); color: var(--accent); font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
  .attendance-list { list-style: none; }
  .attendance-item { display: flex; align-items: center; padding: 11px 1.25rem; border-bottom: 1px solid var(--border); gap: 12px; }
  .attendance-item:last-child { border-bottom: none; }
  .seat-no { font-size: 12px; font-weight: 500; color: var(--muted); min-width: 28px; }
  .member-info { flex: 1; }
  .member-name { font-size: 14px; font-weight: 500; color: var(--ink); }
  .member-id { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .empty-state { padding: 2rem; text-align: center; color: var(--muted); font-size: 14px; }
  .refresh-row { text-align: center; margin-top: 0.75rem; }
  .btn-refresh { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 6px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; }
  .btn-refresh:hover { border-color: var(--ink); color: var(--ink); }
  .loading-dots { display: inline-flex; gap: 4px; vertical-align: middle; }
  .loading-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: dot 1.2s infinite ease-in-out; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
  .note { font-size: 12px; color: var(--muted); text-align: center; margin-top: 1.5rem; line-height: 1.6; }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="club-label">Movie Club · Event RSVP</div>
    <div class="movie-title" id="movieTitle">Interstellar</div>
    <div class="meta-grid">
      <div class="meta-item">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span id="eventDate">Saturday, 14 June 2025</span>
      </div>
      <div class="meta-item">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <span id="eventTime">6:30 PM</span>
      </div>
      <div class="meta-item">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
        <span id="eventVenue">Carnival Cinemas, Vyttila</span>
      </div>
    </div>
  </div>

  <hr class="divider">
  <p class="section-title">Confirm your attendance</p>

  <div class="card">
    <div class="form-group">
      <label for="serialNo">Serial No.</label>
      <input type="number" id="serialNo" placeholder="e.g. 42" min="1">
    </div>
    <div class="form-group">
      <label for="memberNo">Club Membership No.</label>
      <input type="text" id="memberNo" placeholder="e.g. L312">
    </div>
    <div class="form-group">
      <label for="memberName">Full Name</label>
      <input type="text" id="memberName" placeholder="Your name as registered">
    </div>
    <button class="btn-submit" id="submitBtn" onclick="submitRSVP()">Confirm Attendance</button>
    <div class="msg" id="statusMsg"></div>
  </div>

  <hr class="divider">
  <p class="section-title">Who's coming</p>

  <div class="attendance-card">
    <div class="attendance-header">
      <h3>Confirmed attendees</h3>
      <span class="count-badge" id="countBadge">0</span>
    </div>
    <ul class="attendance-list" id="attendanceList">
      <li class="empty-state">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <div style="margin-top:8px;">Loading attendance…</div>
      </li>
    </ul>
  </div>

  <div class="refresh-row">
    <button class="btn-refresh" onclick="loadAttendance()">↻ Refresh list</button>
  </div>

  <p class="note">
    List updates live from the master register.<br>
    Contact the organiser if your entry needs correction.
  </p>

</div>

<script>
  // ── CONFIGURATION — edit these values per event ──
  const CONFIG = {
    movieTitle : "Hercules",
    eventDate  : "Wednesday, 17 June 2026",
    eventTime  : "6:30 PM",
    eventVenue : "YachtClub Lounge",
    scriptURL  : "https://script.google.com/macros/s/AKfycbxrfk9jUY9t5b-YcOletq8KBh5CrQSEUoIcgddvKl8mS9UrFBl44V1l-5ofkholbR5o/exec"
  };

  // Populate header
  document.getElementById('movieTitle').textContent = CONFIG.movieTitle;
  document.getElementById('eventDate').textContent  = CONFIG.eventDate;
  document.getElementById('eventTime').textContent  = CONFIG.eventTime;
  document.getElementById('eventVenue').textContent = CONFIG.eventVenue;

  // ── SUBMIT RSVP ──
  function submitRSVP() {
    const serialNo   = document.getElementById('serialNo').value.trim();
    const memberNo   = document.getElementById('memberNo').value.trim();
    const memberName = document.getElementById('memberName').value.trim();
    const btn        = document.getElementById('submitBtn');

    if (!serialNo || !memberNo || !memberName) {
      showMsg('error', 'Please fill in all three fields before confirming.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Submitting…';

    const callbackName = 'submitCallback_' + Date.now();
    const params = new URLSearchParams({
      action    : 'submit',
      serialNo  : serialNo,
      memberNo  : memberNo,
      memberName: memberName,
      movie     : CONFIG.movieTitle,
      eventDate : CONFIG.eventDate,
      timestamp : new Date().toLocaleString('en-IN', {timeZone:'Asia/Kolkata'}),
      callback  : callbackName
    });

    window[callbackName] = function(data) {
      delete window[callbackName];
      btn.disabled = false;
      btn.textContent = 'Confirm Attendance';
      if (data.status === 'ok') {
        showMsg('success', '✓ You\'re on the list! See you at the screening.');
        document.getElementById('serialNo').value   = '';
        document.getElementById('memberNo').value   = '';
        document.getElementById('memberName').value = '';
        setTimeout(loadAttendance, 1000);
      } else if (data.status === 'duplicate') {
        showMsg('error', 'This name + membership number is already registered for this event.');
      } else {
        showMsg('error', 'Something went wrong. Please try again.');
      }
    };

    const script = document.createElement('script');
    script.src = CONFIG.scriptURL + '?' + params.toString();
    script.onerror = function() {
      btn.disabled = false;
      btn.textContent = 'Confirm Attendance';
      showMsg('error', 'Could not reach the server. Please try again.');
    };
    document.body.appendChild(script);
  }

  // ── LOAD ATTENDANCE LIST ──
  function loadAttendance() {
    const list = document.getElementById('attendanceList');
    list.innerHTML = '<li class="empty-state"><div class="loading-dots"><span></span><span></span><span></span></div><div style="margin-top:8px;">Loading…</div></li>';

    const callbackName = 'listCallback_' + Date.now();
    const params = new URLSearchParams({
      action    : 'list',
      movie     : CONFIG.movieTitle,
      eventDate : CONFIG.eventDate,
      callback  : callbackName
    });

    window[callbackName] = function(data) {
      delete window[callbackName];
      renderList(data.rows || []);
    };

    const script = document.createElement('script');
    script.src = CONFIG.scriptURL + '?' + params.toString();
    script.onerror = function() {
      list.innerHTML = '<li class="empty-state">Could not load attendance. Try refreshing.</li>';
    };
    document.body.appendChild(script);
  }

  // ── RENDER LIST ──
  function renderList(rows) {
    const list  = document.getElementById('attendanceList');
    const badge = document.getElementById('countBadge');
    badge.textContent = rows.length;
    if (rows.length === 0) {
      list.innerHTML = '<li class="empty-state">No confirmations yet — be the first!</li>';
      return;
    }
    list.innerHTML = rows.map(function(r, i) {
      return '<li class="attendance-item">' +
        '<span class="seat-no">' + String(i + 1).padStart(2, '0') + '</span>' +
        '<div class="member-info">' +
          '<div class="member-name">' + escHtml(r.name) + '</div>' +
          '<div class="member-id">Serial ' + escHtml(String(r.serial)) + ' · ' + escHtml(r.memberId) + '</div>' +
        '</div></li>';
    }).join('');
  }

  function showMsg(type, text) {
    const el = document.getElementById('statusMsg');
    el.className = 'msg ' + type;
    el.textContent = text;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Load on page open
  loadAttendance();
</script>
</body>
</html>
