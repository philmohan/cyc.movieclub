<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Movie Club — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --ink: #1a1a1a; --muted: #6b6b6b; --pale: #f5f2ee; --cream: #faf8f5;
    --border: #ddd8d0; --accent: #c0392b; --accent-soft: #f9edec;
    --success: #1a6640; --success-soft: #eaf4ee; --card: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: var(--pale); color: var(--ink); min-height: 100vh; padding: 1.5rem 1rem 3rem; }
  .page { max-width: 560px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; }
  .club-label { font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.4rem; }
  h1 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--ink); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  .section-title { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.85rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; }
  .form-group { margin-bottom: 0.9rem; }
  .form-group:last-child { margin-bottom: 0; }
  .form-row { display: flex; gap: 0.75rem; }
  .form-row .form-group { flex: 1; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  input[type="text"], input[type="password"], input[type="date"], input[type="time"] {
    width: 100%; padding: 12px 14px; font-family: 'DM Sans', sans-serif; font-size: 16px;
    color: var(--ink); background: var(--cream); border: 1px solid var(--border);
    border-radius: 10px; outline: none; -webkit-appearance: none; appearance: none; transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent); background: #fff; }
  .btn { width: 100%; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; border: none; border-radius: 10px; cursor: pointer; -webkit-appearance: none; }
  .btn-primary { background: var(--accent); color: #fff; margin-top: 0.25rem; }
  .btn-primary:active { opacity: 0.85; }
  .btn-primary:disabled { background: var(--muted); cursor: not-allowed; }
  .btn-secondary { background: var(--cream); color: var(--ink); border: 1px solid var(--border); margin-top: 0.5rem; }
  .btn-sm { width: auto; padding: 8px 14px; font-size: 13px; border-radius: 8px; margin-top: 0; }
  .msg { display: none; padding: 12px 14px; border-radius: 10px; font-size: 14px; margin-top: 0.75rem; }
  .msg.success { display: block; background: var(--success-soft); color: var(--success); border: 1px solid #b2d8c0; }
  .msg.error   { display: block; background: var(--accent-soft); color: var(--accent); border: 1px solid #e8b4b0; }
  .hidden { display: none !important; }
  #loginScreen { max-width: 360px; margin: 3rem auto; }
  .event-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.1rem; margin-bottom: 0.75rem; }
  .event-top { display: flex; align-items: flex-start; gap: 10px; }
  .event-info { flex: 1; }
  .event-movie { font-size: 15px; font-weight: 500; color: var(--ink); }
  .event-meta { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
  .event-actions { display: flex; gap: 8px; flex-shrink: 0; margin-top: 2px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; margin-left: 6px; }
  .badge-active { background: var(--success-soft); color: var(--success); }
  .badge-inactive { background: #f0f0f0; color: var(--muted); }
  .share-row { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
  .share-url { flex: 1; font-size: 12px; font-family: monospace; color: var(--muted); background: var(--pale); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; word-break: break-all; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .modal { background: var(--card); border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 1.25rem; }
  .modal-actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
  .modal-actions .btn { margin-top: 0; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div style="text-align:center; margin-bottom:1.5rem;">
    <div class="club-label">Movie Club</div>
    <h1>Admin</h1>
  </div>
  <div class="card">
    <div class="form-group">
      <label for="passwordInput">Password</label>
      <input type="password" id="passwordInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter') checkPassword()">
    </div>
    <button class="btn btn-primary" onclick="checkPassword()">Sign In</button>
    <div class="msg" id="loginMsg"></div>
  </div>
</div>

<!-- MAIN ADMIN -->
<div id="mainAdmin" class="hidden page">
  <div class="header">
    <div class="club-label">Movie Club</div>
    <h1>Event Admin</h1>
  </div>

  <hr class="divider">
  <p class="section-title">Create new event</p>
  <div class="card">
    <div class="form-group">
      <label>Movie Title</label>
      <input type="text" id="newMovie" placeholder="e.g. Interstellar">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="newDate">
      </div>
      <div class="form-group">
        <label>Time</label>
        <input type="time" id="newTime">
      </div>
    </div>
    <div class="form-group">
      <label>Venue</label>
      <input type="text" id="newVenue" placeholder="e.g. YachtClub Lounge">
    </div>
    <button class="btn btn-primary" id="createBtn" onclick="createNewEvent()">Create Event</button>
    <div class="msg" id="createMsg"></div>
    <div id="newEventResult" class="hidden" style="margin-top:1rem;">
      <p style="font-size:13px; color:var(--muted); margin-bottom:8px;">✓ Event created! Share this link with members:</p>
      <div style="display:flex; gap:8px; align-items:flex-start;">
        <div class="share-url" id="newShareUrl"></div>
        <button class="btn btn-secondary btn-sm" onclick="copyText('newShareUrl')">Copy</button>
      </div>
    </div>
  </div>

  <hr class="divider">
  <p class="section-title">All events</p>
  <div id="eventsList">
    <div style="padding:1.5rem; text-align:center; color:var(--muted); font-size:14px;">Loading…</div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay hidden" id="editModal">
  <div class="modal">
    <div class="modal-title">Edit Event</div>
    <input type="hidden" id="editEventId">
    <div class="form-group">
      <label>Movie Title</label>
      <input type="text" id="editMovie">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="editDate">
      </div>
      <div class="form-group">
        <label>Time</label>
        <input type="time" id="editTime">
      </div>
    </div>
    <div class="form-group">
      <label>Venue</label>
      <input type="text" id="editVenue">
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="editStatus" style="width:100%;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--ink);background:var(--cream);border:1px solid var(--border);border-radius:10px;outline:none;">
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
    </div>
    <div class="msg" id="editMsg"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  var CONFIG = {
    password  : "cyc2026",
    scriptURL : "https://script.google.com/macros/s/AKfycbw3atFRxESYOy0riaw50PNI7SLF4mFb1fyVn1QLiYKvnLDGCb4-jMwoUIkH_EQIwsst/exec",
    pageURL   : "https://philmohan.github.io/cyc.movieclub/event.html"
  };

  function checkPassword() {
    var pwd = document.getElementById('passwordInput').value;
    if (pwd === CONFIG.password) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainAdmin').classList.remove('hidden');
      loadEvents();
    } else {
      showMsg('loginMsg', 'error', 'Incorrect password.');
    }
  }

  function createNewEvent() {
    var movie   = document.getElementById('newMovie').value.trim();
    var dateVal = document.getElementById('newDate').value;
    var timeVal = document.getElementById('newTime').value;
    var venue   = document.getElementById('newVenue').value.trim();
    var btn     = document.getElementById('createBtn');

    clearMsg('createMsg');
    if (!movie || !dateVal || !timeVal || !venue) {
      showMsg('createMsg', 'error', 'Please fill in all fields.');
      return;
    }

    // Format date as "Tuesday, 23 June 2026"
    var dateObj    = new Date(dateVal + 'T12:00:00');
    var days       = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var months     = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var dateStr    = days[dateObj.getDay()] + ', ' + dateObj.getDate() + ' ' + months[dateObj.getMonth()] + ' ' + dateObj.getFullYear();

    // Format time as "6:30 PM"
    var timeParts  = timeVal.split(':');
    var h          = parseInt(timeParts[0]);
    var m          = timeParts[1];
    var ampm       = h >= 12 ? 'PM' : 'AM';
    var h12        = h % 12 || 12;
    var timeStr    = h12 + ':' + m + ' ' + ampm;

    btn.disabled = true;
    btn.textContent = 'Creating…';

    var cb = "createCb_" + Date.now();
    window[cb] = function(data) {
      delete window[cb];
      btn.disabled = false;
      btn.textContent = 'Create Event';
      if (data.status === 'ok') {
        showMsg('createMsg', 'success', '✓ Event created successfully!');
        document.getElementById('newMovie').value = '';
        document.getElementById('newDate').value  = '';
        document.getElementById('newTime').value  = '';
        document.getElementById('newVenue').value = '';
        var shareUrl = CONFIG.pageURL + '?event=' + data.id;
        document.getElementById('newShareUrl').textContent = shareUrl;
        document.getElementById('newEventResult').classList.remove('hidden');
        loadEvents();
      } else {
        showMsg('createMsg', 'error', 'Failed to create event. Please try again.');
      }
    };

    jsonp({ action: 'createEvent', movie: movie, date: dateStr, time: timeStr, venue: venue, callback: cb });
  }

  function loadEvents() {
    var cb = "evtsCb_" + Date.now();
    window[cb] = function(data) {
      delete window[cb];
      renderEvents(data.events || []);
    };
    jsonp({ action: 'getEvents', callback: cb });
  }

  function renderEvents(events) {
    var el = document.getElementById('eventsList');
    if (events.length === 0) {
      el.innerHTML = '<p style="font-size:14px;color:var(--muted);text-align:center;padding:1rem;">No events yet.</p>';
      return;
    }
    events.reverse();
    el.innerHTML = events.map(function(e) {
      var badge    = e.active === 'active' ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-inactive">Inactive</span>';
      var shareUrl = CONFIG.pageURL + '?event=' + e.id;
      return '<div class="event-item">' +
        '<div class="event-top">' +
          '<div class="event-info">' +
            '<div class="event-movie">' + esc(e.movie) + badge + '</div>' +
            '<div class="event-meta">' + esc(e.date) + '<br>' + esc(e.time) + ' · ' + esc(e.venue) + '</div>' +
          '</div>' +
          '<div class="event-actions">' +
            '<button class="btn btn-secondary btn-sm" onclick="openEdit(\'' + e.id + '\')">Edit</button>' +
          '</div>' +
        '</div>' +
        '<div class="share-row">' +
          '<div class="share-url">' + esc(shareUrl) + '</div>' +
          '<button class="btn btn-secondary btn-sm" onclick="copyShareUrl(\'' + esc(shareUrl) + '\')">Copy Link</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function openEdit(id) {
    var cb = "getCb_" + Date.now();
    window[cb] = function(data) {
      delete window[cb];
      if (data.status === 'ok') {
        var e = data.event;
        document.getElementById('editEventId').value = e.id;
        document.getElementById('editMovie').value   = e.movie;
        document.getElementById('editVenue').value   = e.venue;
        document.getElementById('editStatus').value  = e.active || 'active';
        // Parse date back to YYYY-MM-DD for date input
        var dp = parseDisplayDate(e.date);
        document.getElementById('editDate').value = dp;
        // Parse time back to HH:MM for time input
        document.getElementById('editTime').value = parseDisplayTime(e.time);
        clearMsg('editMsg');
        document.getElementById('editModal').classList.remove('hidden');
      }
    };
    jsonp({ action: 'getEvent', id: id, callback: cb });
  }

  function saveEdit() {
    var id      = document.getElementById('editEventId').value;
    var movie   = document.getElementById('editMovie').value.trim();
    var dateVal = document.getElementById('editDate').value;
    var timeVal = document.getElementById('editTime').value;
    var venue   = document.getElementById('editVenue').value.trim();
    var active  = document.getElementById('editStatus').value;

    clearMsg('editMsg');

    var dateObj = new Date(dateVal + 'T12:00:00');
    var days    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var months  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var dateStr = days[dateObj.getDay()] + ', ' + dateObj.getDate() + ' ' + months[dateObj.getMonth()] + ' ' + dateObj.getFullYear();

    var timeParts = timeVal.split(':');
    var h         = parseInt(timeParts[0]);
    var m         = timeParts[1];
    var ampm      = h >= 12 ? 'PM' : 'AM';
    var h12       = h % 12 || 12;
    var timeStr   = h12 + ':' + m + ' ' + ampm;

    var cb = "saveCb_" + Date.now();
    window[cb] = function(data) {
      delete window[cb];
      if (data.status === 'ok') {
        showMsg('editMsg', 'success', '✓ Event updated.');
        loadEvents();
        setTimeout(closeModal, 1200);
      } else {
        showMsg('editMsg', 'error', 'Update failed.');
      }
    };
    jsonp({ action: 'updateEvent', id: id, movie: movie, date: dateStr, time: timeStr, venue: venue, active: active, callback: cb });
  }

  function closeModal() {
    document.getElementById('editModal').classList.add('hidden');
  }

  function parseDisplayDate(str) {
    // "Tuesday, 23 June 2026" → "2026-06-23"
    try {
      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var parts  = str.replace(/^[^,]+,\s*/, '').split(' ');
      var d      = parts[0].padStart(2,'0');
      var m      = String(months.indexOf(parts[1]) + 1).padStart(2,'0');
      var y      = parts[2];
      return y + '-' + m + '-' + d;
    } catch(e) { return ''; }
  }

  function parseDisplayTime(str) {
    // "6:30 PM" → "18:30"
    try {
      var parts = str.split(' ');
      var hm    = parts[0].split(':');
      var h     = parseInt(hm[0]);
      var m     = hm[1];
      if (parts[1] === 'PM' && h !== 12) h += 12;
      if (parts[1] === 'AM' && h === 12) h = 0;
      return String(h).padStart(2,'0') + ':' + m;
    } catch(e) { return ''; }
  }

  function copyShareUrl(url) {
    copyToClipboard(url);
    alert('Link copied! Paste into WhatsApp to share with members.');
  }

  function copyText(elId) {
    var text = document.getElementById(elId).textContent;
    copyToClipboard(text);
    alert('Copied to clipboard!');
  }

  function copyToClipboard(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text);
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
  }

  function jsonp(params) {
    var script = document.createElement('script');
    script.src = CONFIG.scriptURL + '?' + buildParams(params);
    document.body.appendChild(script);
  }

  function buildParams(obj) {
    return Object.keys(obj).map(function(k) {
      return encodeURIComponent(k) + '=' + encodeURIComponent(obj[k]);
    }).join('&');
  }

  function showMsg(id, type, text) {
    var el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
  }

  function clearMsg(id) {
    var el = document.getElementById(id);
    el.className = 'msg';
    el.textContent = '';
    el.style.display = 'none';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
