<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Movie Club — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --ink: #1a1a1a; --muted: #6b6b6b; --pale: #f5f2ee; --cream: #faf8f5;
    --border: #ddd8d0; --accent: #c0392b; --accent-soft: #f9edec;
    --success: #1a6640; --success-soft: #eaf4ee; --card: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: var(--pale); color: var(--ink); min-height: 100vh; padding: 1.5rem 1rem 3rem; }
  .page { max-width: 560px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; }
  .club-label { font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.4rem; }
  h1 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--ink); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  .section-title { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.85rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; }
  .form-group { margin-bottom: 0.9rem; }
  .form-group:last-child { margin-bottom: 0; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  input[type="text"], input[type="password"] { width: 100%; padding: 12px 14px; font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--ink); background: var(--cream); border: 1px solid var(--border); border-radius: 10px; outline: none; -webkit-appearance: none; transition: border-color 0.15s; }
  input:focus { border-color: var(--accent); background: #fff; }
  .btn { width: 100%; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; border: none; border-radius: 10px; cursor: pointer; -webkit-appearance: none; }
  .btn-primary { background: var(--accent); color: #fff; margin-top: 0.25rem; }
  .btn-primary:active { opacity: 0.85; }
  .btn-secondary { background: var(--cream); color: var(--ink); border: 1px solid var(--border); margin-top: 0.5rem; }
  .btn-sm { width: auto; padding: 7px 14px; font-size: 13px; border-radius: 8px; }
  .msg { display: none; padding: 12px 14px; border-radius: 10px; font-size: 14px; margin-top: 0.75rem; }
  .msg.success { display: block; background: var(--success-soft); color: var(--success); border: 1px solid #b2d8c0; }
  .msg.error   { display: block; background: var(--accent-soft); color: var(--accent); border: 1px solid #e8b4b0; }
  .hidden { display: none !important; }
  /* Login screen */
  #loginScreen { max-width: 360px; margin: 3rem auto; }
  /* Event list */
  .event-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.1rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 12px; }
  .event-info { flex: 1; }
  .event-movie { font-size: 15px; font-weight: 500; color: var(--ink); }
  .event-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .event-id { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: monospace; background: var(--pale); padding: 2px 6px; border-radius: 4px; display: inline-block; }
  .event-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .badge-active { background: var(--success-soft); color: var(--success); }
  .badge-inactive { background: #f0f0f0; color: var(--muted); }
  /* Edit modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .modal { background: var(--card); border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 1.25rem; }
  .modal-actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
  .modal-actions .btn { margin-top: 0; }
  /* Copy URL box */
  .url-box { background: var(--pale); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 12px; font-family: monospace; word-break: break-all; color: var(--muted); margin-top: 0.75rem; }
  .copy-row { display: flex; gap: 8px; align-items: flex-start; margin-top: 0.5rem; }
  .copy-row .url-box { flex: 1; margin-top: 0; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div style="text-align:center; margin-bottom:1.5rem;">
    <div class="club-label">Movie Club</div>
    <h1>Admin</h1>
  </div>
  <div class="card">
    <div class="form-group">
      <label for="passwordInput">Password</label>
      <input type="password" id="passwordInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter') checkPassword()">
    </div>
    <button class="btn btn-primary" onclick="checkPassword()">Sign In</button>
    <div class="msg" id="loginMsg"></div>
  </div>
</div>

<!-- MAIN ADMIN (hidden until login) -->
<div id="mainAdmin" class="hidden page">
  <div class="header">
    <div class="club-label">Movie Club</div>
    <h1>Event Admin</h1>
  </div>

  <hr class="divider">

  <!-- CREATE EVENT -->
  <p class="section-title">Create new event</p>
  <div class="card">
    <div class="form-group">
      <label>Movie Title</label>
      <input type="text" id="newMovie" placeholder="e.g. Interstellar">
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="text" id="newDate" placeholder="e.g. Wednesday, 17 June 2026">
    </div>
    <div class="form-group">
      <label>Time</label>
      <input type="text" id="newTime" placeholder="e.g. 6:30 PM">
    </div>
    <div class="form-group">
      <label>Venue</label>
      <input type="text" id="newVenue" placeholder="e.g. YachtClub Lounge">
    </div>
    <button class="btn btn-primary" id="createBtn" onclick="createNewEvent()">Create Event</button>
    <div class="msg" id="createMsg"></div>
    <div id="newEventUrl" class="hidden" style="margin-top:1rem;">
      <p style="font-size:13px; color:var(--muted); margin-bottom:6px;">Event created! Share this link with members:</p>
      <div class="copy-row">
        <div class="url-box" id="newEventUrlText"></div>
        <button class="btn btn-secondary btn-sm" onclick="copyUrl('newEventUrlText')" style="white-space:nowrap;">Copy</button>
      </div>
      <p style="font-size:12px; color:var(--muted); margin-top:8px;">Event ID to paste in event.html CONFIG:</p>
      <div class="copy-row">
        <div class="url-box" id="newEventIdText"></div>
        <button class="btn btn-secondary btn-sm" onclick="copyUrl('newEventIdText')" style="white-space:nowrap;">Copy</button>
      </div>
    </div>
  </div>

  <hr class="divider">

  <!-- EVENTS LIST -->
  <p class="section-title">All events</p>
  <div id="eventsList">
    <div class="empty-state" style="padding:1.5rem; text-align:center; color:var(--muted); font-size:14px;">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div style="margin-top:8px;">Loading events…</div>
    </div>
  </div>

</div>

<!-- EDIT MODAL -->
<div class="modal-overlay hidden" id="editModal">
  <div class="modal">
    <div class="modal-title">Edit Event</div>
    <input type="hidden" id="editEventId">
    <div class="form-group">
      <label>Movie Title</label>
      <input type="text" id="editMovie" placeholder="Movie title">
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="text" id="editDate" placeholder="e.g. Wednesday, 17 June 2026">
    </div>
    <div class="form-group">
      <label>Time</label>
      <input type="text" id="editTime" placeholder="e.g. 6:30 PM">
    </div>
    <div class="form-group">
      <label>Venue</label>
      <input type="text" id="editVenue" placeholder="Venue name">
    </div>
    <div class="form-group">
      <label>Status</label>
      <input type="text" id="editStatus" placeholder="active or inactive">
    </div>
    <div class="msg" id="editMsg"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  // ── CONFIGURATION ──────────────────────────────────────────────
  var CONFIG = {
    password  : "cyc2026",               // ← change this password
    scriptURL : "https://script.google.com/macros/s/AKfycbw3atFRxESYOy0riaw50PNI7SLF4mFb1fyVn1QLiYKvnLDGCb4-jMwoUIkH_EQIwsst/exec",  // ← paste Web App URL
    pageURL   : "https://philmohan.github.io/cyc.movieclub/event.html"  // ← your event page URL
  };
  // ──────────────────────────────────────────────────────────────

  var isLoggedIn = false;

  function checkPassword() {
    var pwd = document.getElementById('passwordInput').value;
    if (pwd === CONFIG.password) {
      isLoggedIn = true;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainAdmin').classList.remove('hidden');
      loadEvents();
    } else {
      showMsg('loginMsg', 'error', 'Incorrect password.');
    }
  }

  // ── CREATE EVENT ──────────────────────────────────────────────
  function createNewEvent() {
    var movie = document.getElementById('newMovie').value.trim();
    var date  = document.getElementById('newDate').value.trim();
    var time  = document.getElementById('newTime').value.trim();
    var venue = document.getElementById('newVenue').value.trim();
    var btn   = document.getElementById('createBtn');

    clearMsg('createMsg');
    if (!movie || !date || !time || !venue) {
      showMsg('createMsg', 'error', 'Please fill in all fields.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating…';

    var cb = "createCb_" + Date.now();
    window[cb] = function(data) {
      delete window[cb];
      btn.disabled = false;
      btn.textContent = 'Create Event';
      if (data.status === 'ok') {
        showMsg('createMsg', 'success', '✓ Event created successfully!');
        document.getElementById('newMovie').value = '';
        document.getElementById('newDate').value  = '';
        document.getElementById('newTime').value  = '';
        document.getElementById('newVenue').value = '';
        // Show the event URL and ID
        var urlBox = document.getElementById('newEventUrl');
        urlBox.classList.remove('hidden');
        document.getElementById('newEventUrlText').textContent = CONFIG.pageURL + '?event=' + data.id;
        document.getElementById('newEventIdText').textContent  = data.id;
        loadEvents();
      } else {
        showMsg('createMsg', 'error', 'Failed to create event. Please try again.');
      }
    };

    jsonp({ action: 'createEvent', movie: movie, date: date, time: time, venue: venue, callback: cb });
  }

  // ── LOAD EVENTS ───────────────────────────────────────────────
  function loadEvents() {
    var cb = "evtsCb_" + Date.now();
    window[cb] = function(data) {
      delete window[cb];
      renderEvents(data.events || []);
    };
    jsonp({ action: 'getEvents', callback: cb });
  }

  function renderEvents(events) {
    var el = document.getElementById('eventsList');
    if (events.length === 0) {
      el.innerHTML = '<p style="font-size:14px; color:var(--muted); text-align:center; padding:1rem;">No events yet — create one above.</p>';
      return;
    }
    // Show newest first
    events.reverse();
    el.innerHTML = events.map(function(e) {
      var badge = e.active === 'active'
        ? '<span class="badge badge-active">Active</span>'
        : '<span class="badge badge-inactive">Inactive</span>';
      return '<div class="event-item">' +
        '<div class="event-info">' +
          '<div class="event-movie">' + esc(e.movie) + ' ' + badge + '</div>' +
          '<div class="event-meta">' + esc(e.date) + ' · ' + esc(e.time) + ' · ' + esc(e.venue) + '</div>' +
          '<div class="event-id">' + esc(e.id) + '</div>' +
        '</div>' +
        '<div class="event-actions">' +
          '<button class="btn btn-secondary btn-sm" onclick="openEdit(\'' + esc(e.id) + '\')">Edit</button>' +
          '<button class="btn btn-secondary btn-sm" onclick="copyEventId(\'' + esc(e.id) + '\')">Copy ID</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  // ── EDIT EVENT ────────────────────────────────────────────────
  function openEdit(id) {
    var cb = "getCb_" + Date.now();
    window[cb] = function(data) {
      delete window[cb];
      if (data.status === 'ok') {
        var e = data.event;
        document.getElementById('editEventId').value = e.id;
        document.getElementById('editMovie').value   = e.movie;
        document.getElementById('editDate').value    = e.date;
        document.getElementById('editTime').value    = e.time;
        document.getElementById('editVenue').value   = e.venue;
        document.getElementById('editStatus').value  = e.active;
        clearMsg('editMsg');
        document.getElementById('editModal').classList.remove('hidden');
      }
    };
    jsonp({ action: 'getEvent', id: id, callback: cb });
  }

  function saveEdit() {
    var id     = document.getElementById('editEventId').value;
    var movie  = document.getElementById('editMovie').value.trim();
    var date   = document.getElementById('editDate').value.trim();
    var time   = document.getElementById('editTime').value.trim();
    var venue  = document.getElementById('editVenue').value.trim();
    var active = document.getElementById('editStatus').value.trim();

    clearMsg('editMsg');

    var cb = "saveCb_" + Date.now();
    window[cb] = function(data) {
      delete window[cb];
      if (data.status === 'ok') {
        showMsg('editMsg', 'success', '✓ Event updated.');
        loadEvents();
        setTimeout(closeModal, 1200);
      } else {
        showMsg('editMsg', 'error', 'Update failed. Please try again.');
      }
    };

    jsonp({ action: 'updateEvent', id: id, movie: movie, date: date, time: time, venue: venue, active: active, callback: cb });
  }

  function closeModal() {
    document.getElementById('editModal').classList.add('hidden');
  }

  // ── HELPERS ───────────────────────────────────────────────────
  function copyEventId(id) {
    copyText(id);
    alert('Event ID copied: ' + id + '\n\nPaste this as eventId in your event.html CONFIG.');
  }

  function copyUrl(elId) {
    var text = document.getElementById(elId).textContent;
    copyText(text);
    alert('Copied to clipboard!');
  }

  function copyText(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text);
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
  }

  function jsonp(params) {
    var script = document.createElement('script');
    script.src = CONFIG.scriptURL + '?' + buildParams(params);
    document.body.appendChild(script);
  }

  function buildParams(obj) {
    return Object.keys(obj).map(function(k) {
      return encodeURIComponent(k) + '=' + encodeURIComponent(obj[k]);
    }).join('&');
  }

  function showMsg(id, type, text) {
    var el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
  }

  function clearMsg(id) {
    var el = document.getElementById(id);
    el.className = 'msg';
    el.textContent = '';
    el.style.display = 'none';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
